# This is a simple Semaphore configuration file
# For more information about Semaphore configuration visit:
# https://docs.semaphoreci.com/reference/pipeline-yaml-reference/

version: v1.0
name: Build and Push Docker Image
agent:
  machine:
    type: f1-standard-4
    os_image: ubuntu2404
blocks:
  - name: Build and Push
    task:
      secrets:
        - name: DejanDocker
      jobs:
        - name: Docker build and push
          commands:

            - checkout
            - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
            - 'docker build -t $DOCKER_USERNAME/myapp:$SEMAPHORE_GIT_SHA 7-pipeline/'
            - 'docker tag $DOCKER_USERNAME/myapp:$SEMAPHORE_GIT_SHA $DOCKER_USERNAME/myapp:latest'
            - 'docker push $DOCKER_USERNAME/myapp:$SEMAPHORE_GIT_SHA'
            - 'docker push $DOCKER_USERNAME/myapp:latest'